<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#000000;
  --text:#f4efe5;
  --muted:rgba(244,239,229,.84);
  --line:rgba(255,255,255,.18);
  --font-body:"Open Sans",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --font-head:"Playfair Display",Georgia,"Times New Roman",serif;
}

html,body{
  min-height:100%;
  background:var(--bg);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

a{
  color:inherit;
  text-decoration:none;
}

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  isolation:isolate;
  background:#000;
}

.hero::before{
  content:"";
  position:absolute;
  inset:-6%;
  background:url("/assets/mt_park_page_02.jpg") center center/cover no-repeat;
  transform:scale(1.08) translate3d(0,0,0);
  animation:heroDrift 30s ease-in-out infinite alternate;
  will-change:transform;
  z-index:-3;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(0,0,0,.02) 0%, rgba(0,0,0,.10) 48%, rgba(0,0,0,.22) 100%),
    linear-gradient(to bottom, rgba(0,0,0,.22) 0%, rgba(0,0,0,.06) 20%, rgba(0,0,0,.08) 44%, rgba(0,0,0,.16) 68%, rgba(0,0,0,.42) 100%);
  z-index:-2;
}

.hero-topfade{
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:14vh;
  background:linear-gradient(to bottom, rgba(0,0,0,.34), rgba(0,0,0,0));
  z-index:-1;
}

.hero-bottomfade{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:22vh;
  background:linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,0));
  z-index:-1;
}

.hero-content{
  width:min(100%, 1200px);
  padding:40px 24px 108px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.hero-kicker{
  font-size:12px;
  font-weight:600;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:rgba(255,255,255,.90);
  text-shadow:0 2px 10px rgba(0,0,0,.24);
  opacity:0;
  transform:translateY(10px);
  animation:kickerFade 1.2s ease-out .15s forwards;
}

.hero h1{
  margin:0;
  font-family:var(--font-head);
  color:var(--text);
  font-size:clamp(3.1rem, 7.8vw, 6.3rem);
  line-height:.92;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
  text-shadow:
    0 3px 14px rgba(0,0,0,.18),
    0 12px 30px rgba(0,0,0,.24),
    0 0 1px rgba(0,0,0,.14);
  opacity:0;
  transform:translateY(18px) scale(.985);
  animation:titleFade 1.6s cubic-bezier(.2,.8,.2,1) .35s forwards;
}

.hero h1 span{
  display:block;
}

.hero h1 span:first-child{
  margin-bottom:6px;
}

.hero-line{
  margin-top:10px;
  padding-top:18px;
  border-top:1px solid var(--line);
  max-width:980px;
  width:min(100%, 980px);
  color:var(--muted);
  font-size:clamp(.86rem, 1.2vw, 1rem);
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-shadow:0 2px 10px rgba(0,0,0,.22);
  text-align:center;
  line-height:1.8;
  opacity:0;
  transform:translateY(12px);
  animation:lineFade 1.2s ease-out .8s forwards;
}

.coming{
  position:absolute;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
  width:calc(100% - 40px);
  text-align:center;
  font-size:.72rem;
  letter-spacing:.30em;
  text-transform:uppercase;
  color:rgba(255,255,255,.62);
  text-shadow:0 2px 8px rgba(0,0,0,.22);
  opacity:0;
  animation:comingFade 1.1s ease-out 1.2s forwards;
}

@keyframes heroDrift{
  0%{
    transform:scale(1.08) translate3d(0,0,0);
  }
  50%{
    transform:scale(1.12) translate3d(-1.2%, -0.8%, 0);
  }
  100%{
    transform:scale(1.10) translate3d(1.2%, 0.7%, 0);
  }
}

@keyframes kickerFade{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes titleFade{
  0%{
    opacity:0;
    transform:translateY(18px) scale(.985);
    filter:blur(4px);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
  }
}

@keyframes lineFade{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes comingFade{
  to{
    opacity:1;
  }
}

@media (max-width:700px){
  .hero{
    min-height:100svh;
  }

  .hero-content{
    padding:28px 20px 90px;
    gap:16px;
  }

  .hero-kicker{
    font-size:11px;
    letter-spacing:.28em;
  }

  .hero h1{
    font-size:clamp(2.55rem, 12vw, 4.35rem);
    letter-spacing:.03em;
  }

  .hero-line{
    max-width:620px;
    font-size:.78rem;
    letter-spacing:.12em;
    line-height:1.75;
    padding-top:16px;
  }

  .coming{
    font-size:.66rem;
    letter-spacing:.22em;
    bottom:18px;
  }
}

@media (prefers-reduced-motion:reduce){
  .hero::before{
    animation:none;
    transform:scale(1.08);
  }

  .hero-kicker,
  .hero h1,
  .hero-line,
  .coming{
    opacity:1;
    transform:none;
    animation:none;
    filter:none;
  }
}
</style>
